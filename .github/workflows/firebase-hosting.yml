name: Build and Deploy Firebase Hosting

on:
  push:
    branches:
    - main
  pull_request:


jobs:
  build_and_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Deploy preview channel
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEPTIDE_STORE }}
        projectId: peptide-store

  build_and_deploy_live:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Deploy live
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        channelId: live
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEPTIDE_STORE }}
        projectId: peptide-store
